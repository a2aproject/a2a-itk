quarkus.http.port=10102
quarkus.grpc.server.port=11002

# File logging
quarkus.log.file.enable=true
quarkus.log.file.path=/tmp/java-v10.log
quarkus.log.file.level=DEBUG
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n

# OpenTelemetry configuration
quarkus.otel.sdk.disabled=false
quarkus.observability.lgtm.grafana-port=3001
quarkus.observability.lgtm.otel-grpc-port=5317
quarkus.observability.lgtm.otel-http-port=5318
